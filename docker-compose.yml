services:
  db:
    image: postgres:15
    container_name: postgres-db
    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: flask-app
    env_file:
      - .env

    ports:
      - "5000:5000"

    depends_on:
      - db

volumes:
  postgres_data: