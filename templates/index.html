<!DOCTYPE html>
<html>
<head>
    <title>Doctor Appointment</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">🩺 Book Appointment</h2>

        <div class="row g-2">
            <div class="col-md-5">
                <input id="name" class="form-control" placeholder="Your Name">
            </div>

            <div class="col-md-5">
                <input id="doctor" class="form-control" placeholder="Doctor Name">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="book()">Book</button>
            </div>
        </div>

        <hr>

        <h4 class="mt-3">Appointments</h4>
        <ul id="list" class="list-group mt-2"></ul>

    </div>
</div>

<script>
async function load() {
    let res = await fetch('/appointments');
    let data = await res.json();

    let list = document.getElementById('list');
    list.innerHTML = '';

    data.forEach(a => {
        let li = document.createElement('li');
        li.className = "list-group-item";
        li.innerText = a.name + " → " + a.doctor;
        list.appendChild(li);
    });
}

async function book() {
    let name = document.getElementById('name').value;
    let doctor = document.getElementById('doctor').value;

    if (!name || !doctor) {
        alert("Please fill all fields");
        return;
    }

    await fetch('/appointments', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, doctor})
    });

    load();
}

load();
</script>

</body>
</html>
