<!DOCTYPE html>
<html>
<head>
    <title>Doctor Appointment</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">🩺 Book Appointment</h2>

        <div class="row g-2">
            <div class="col-md-5">
                <input id="name" class="form-control" placeholder="Your Name">
            </div>

            <div class="col-md-5">
                <input id="doctor" class="form-control" placeholder="Doctor Name">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="book()">Book</button>
            </div>
        </div>

        <hr>

        <h4 class="mt-3">Appointments</h4>
        <ul id="list" class="list-group mt-2"></ul>

    </div>
    <!-- Add this below the form -->
    <div id="status" class="mt-3"></div>
</div>

<script>
async function load() {
    let list = document.getElementById('list');
    list.innerHTML = '<li class="list-group-item">Loading...</li>';

    try {
        let res = await fetch('/appointments');
        let data = await res.json();

        list.innerHTML = '';

        if (data.length === 0) {
            list.innerHTML = '<li class="list-group-item text-muted">No appointments yet</li>';
            return;
        }

        data.forEach(a => {
            let li = document.createElement('li');
            li.className = "list-group-item d-flex justify-content-between align-items-center";
            li.innerHTML = `
                ${a.name} → ${a.doctor}
                <button class="btn btn-sm btn-danger" onclick="remove(${a.id})">Delete</button>
            `;
            list.appendChild(li);
        });

    } catch (e) {
        list.innerHTML = '<li class="list-group-item text-danger">Failed to load data</li>';
    }
}

async function book() {
    let name = document.getElementById('name').value.trim();
    let doctor = document.getElementById('doctor').value.trim();
    let status = document.getElementById('status');

    if (!name || !doctor) {
        status.innerHTML = '<div class="alert alert-warning">Please fill all fields</div>';
        return;
    }

    status.innerHTML = '<div class="alert alert-info">Booking...</div>';

    try {
        await fetch('/appointments', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, doctor})
        });

        status.innerHTML = '<div class="alert alert-success">Appointment booked!</div>';
        document.getElementById('name').value = '';
        document.getElementById('doctor').value = '';

        load();

    } catch (e) {
        status.innerHTML = '<div class="alert alert-danger">Something went wrong</div>';
    }
}
</script>

</body>
</html>
